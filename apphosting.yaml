# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

env:
  - variable: BAMBOOHR_SUBDOMAIN
    value: workatveriff
    availability:
      - RUNTIME
  - variable: BAMBOOHR_API_KEY
    secret: bamboohr-api-key
    availability:
      - RUNTIME
  - variable: GOOGLE_CLIENT_ID
    secret: google-oauth-client-id
    availability:
      - RUNTIME
  - variable: GOOGLE_CLIENT_SECRET
    secret: google-oauth-client-secret
    availability:
      - RUNTIME
